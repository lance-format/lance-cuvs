name: Rust Build

on:
  pull_request:
  push:
    branches:
      - main

env:
  UV_EXTRA_INDEX_URL: https://pypi.nvidia.com

jobs:
  rust-build:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            curl \
            git \
            libprotobuf-dev \
            libssl-dev \
            pkg-config \
            protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - uses: Swatinem/rust-cache@v2

      - name: Sync development environment
        run: uv sync --group dev --no-install-project

      - name: Export RAPIDS build paths
        run: |
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "CMAKE=$PWD/.venv/bin/cmake" >> "$GITHUB_ENV"
          .venv/bin/python tools/rapids_env.py --format github-env >> "$GITHUB_ENV"

      - name: Build Rust crate
        run: cargo build --manifest-path backends/cuvs_26_02/Cargo.toml --locked --all-targets
