name: Python Build

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: python-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_EXTRA_INDEX_URL: https://pypi.nvidia.com

jobs:
  python-build:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            curl \
            git \
            just \
            libprotobuf-dev \
            libssl-dev \
            patchelf \
            pkg-config \
            protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backends/cuvs_26_02 -> target

      - name: Run Python build checks
        run: just python-build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
